<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <link rel="stylesheet" href="styles.css">
    <script src="index.js" defer ></script>
</head>
<body>

    <header>
        <h1>Midnight Mystery</h1>

        <nav class="main-nav">

            <a href="index.html">🎃 Menu</a>
            <a href="detective.html">👀 Start Game</a>
            <a href="how-to-play.html">👻 How to play</a>
            <a href="contact.html">🦇 Contact Us</a>
        </nav>
    </header>

    <main>
        <h2>Contact Us</h2>

        <section class="intro-card">

            <form class="contact-form" id="contactForm">

                <label for="name">Name</label>
                <input id="name" name="name" type="text" required>

                <label for="email">Email</label>
                <input id="email" name="email" type="email" required>

                <label for="message">Message</label>
                <textarea id="message" name="message" minlength="10" required></textarea>

                <button type="submit">Send Message</button>

                <p id="successMessage"></p>

            </form>
        </section>
    </main>

    <footer>
        <h3>Riddle</h3>
        <p>I travel without feet and speak without a voice, You send me away then wait for a reply.   What am I?</p>

        <div class="footer-answer">
        <p> A Message </p>
        <div class="covered-answer">
            Move to reveal
        </div>
        </div>

    </footer>

</body>
</html>
